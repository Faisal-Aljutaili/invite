version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: invite_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invitedb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: invite_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_NAME: invitedb
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: "3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b"
      FRONTEND_URL: "http://localhost:3000"
      MAIL_HOST: smtp.gmail.com
      MAIL_USER: ""
      MAIL_PASS: ""
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: invite_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
